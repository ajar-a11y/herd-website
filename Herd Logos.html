<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Herd — Logo Directions (Flock-inspired)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; font-family: 'Inter Tight', system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="logo-components.jsx"></script>

<script type="text/babel">
  const { createRoot } = ReactDOM;

  function App() {
    const directions = [
      { key: 'flock', d: LOGOS.flock, concept: (<>A flock in <em>V-formation</em> — each brand a bird, the group moving further together than any could alone.</>) },
      { key: 'gather', d: LOGOS.gather, concept: (<>Overlapping circles — distinct brands sharing a <em>center of gravity</em>, stronger at the intersections.</>) },
      { key: 'drove', d: LOGOS.drove, concept: (<>A drove of cattle moving forward together — <em>quiet power</em>, always in motion.</>) },
    ];

    return (
      <DesignCanvas title="Herd — Logo Directions">
        {directions.map((dir, i) => (
          <DCSection key={dir.key} id={dir.key} title={`0${i+1} / ${dir.d.name}`}>
            <DCArtboard id={`${dir.key}-concept`} label="Concept" width={620} height={380}>
              <ConceptNote d={dir.d}>{dir.concept}</ConceptNote>
            </DCArtboard>
            <DCArtboard id={`${dir.key}-mark`} label="Mark only" width={400} height={400}>
              <LogoLockup d={dir.d} variant="mark"/>
            </DCArtboard>
            <DCArtboard id={`${dir.key}-horizontal`} label="Horizontal lockup" width={760} height={320}>
              <LogoLockup d={dir.d} variant="horizontal"/>
            </DCArtboard>
            <DCArtboard id={`${dir.key}-stacked`} label="Stacked lockup" width={420} height={420}>
              <LogoLockup d={dir.d} variant="stacked"/>
            </DCArtboard>
            <DCArtboard id={`${dir.key}-wordmark`} label="Wordmark" width={560} height={260}>
              <LogoLockup d={dir.d} variant="wordmark"/>
            </DCArtboard>
            <DCArtboard id={`${dir.key}-favicon`} label="Favicon / app icon" width={640} height={420}>
              <Favicon d={dir.d}/>
            </DCArtboard>
            <DCArtboard id={`${dir.key}-reversed`} label="Reversed" width={760} height={300}>
              <Reversed d={dir.d}/>
            </DCArtboard>
            <DCArtboard id={`${dir.key}-context`} label="In context" width={620} height={420}>
              <InContext d={dir.d}/>
            </DCArtboard>
          </DCSection>
        ))}
      </DesignCanvas>
    );
  }

  createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
